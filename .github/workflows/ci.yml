name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Type check all packages
        run: npm run type-check

  # NOTE: the previous Lint job was removed — `next lint` was never configured
  # (interactive prompt in CI) and the bundled parser is broken in this install.
  # Type Check + Content Validation are the enforced gates for v1.

  content-validation:
    name: Curriculum Content Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Validate curriculum (ids, flashcards, letter cards, vocab order)
        run: cd packages/content && npm run validate
